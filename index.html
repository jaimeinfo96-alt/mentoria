<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<title>Postulación · Mentoría con Jaime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#000;--bg:#0D0D0D;--paper:#F7F3EF;--muted:rgba(247,243,239,.55);
    --line:rgba(247,243,239,.12);--glass:rgba(247,243,239,.05);--gold:#FFE000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Outfit',system-ui,sans-serif;background:#000;color:var(--paper);
    min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;
    overflow-x:hidden;-webkit-font-smoothing:antialiased}

  /* atmosphere */
  .bg{display:none}
  .glow{position:absolute;left:50%;top:-6%;width:min(720px,150vw);height:min(720px,150vw);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(255,120,30,.34) 0%,rgba(255,92,12,.12) 34%,transparent 64%);
    filter:blur(8px);animation:breathe 9s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.8;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}}
  .p{position:absolute;bottom:-10px;border-radius:50%;background:rgba(255,160,70,.8);
    box-shadow:0 0 6px rgba(255,140,50,.7);animation:ember linear infinite;opacity:0}
  @keyframes ember{0%{transform:translateY(0) translateX(0);opacity:0}14%{opacity:.6}82%{opacity:.3}100%{transform:translateY(-104vh) translateX(var(--dx,0));opacity:0}}

  .page{position:relative;z-index:1;width:100%;max-width:480px;min-height:100dvh;
    display:flex;flex-direction:column;padding:0 22px}

  /* top bar: back + progress */
  .top{display:flex;align-items:center;gap:14px;padding:18px 2px 6px;min-height:52px}
  .back{appearance:none;background:none;border:none;color:var(--muted);cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;
    display:inline-flex;align-items:center;gap:6px;padding:6px 4px;opacity:0;pointer-events:none;transition:opacity .2s,color .2s}
  .back.show{opacity:1;pointer-events:auto}
  .back:hover{color:var(--paper)}
  .progress{flex:1;height:3px;border-radius:3px;background:rgba(247,243,239,.1);overflow:hidden;opacity:0;transition:opacity .25s}
  .progress.show{opacity:1}
  .progress span{display:block;height:100%;width:0;border-radius:3px;background:var(--gold);transition:width .4s cubic-bezier(.2,.8,.2,1)}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0 40px}

  /* ---- shared bits ---- */
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .q{font-size:clamp(24px,6.4vw,30px);font-weight:500;line-height:1.18;letter-spacing:-.02em}
  .sub{margin-top:10px;font-size:14.5px;font-weight:300;color:var(--muted);line-height:1.5}

  .opts{margin-top:24px;display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;
    padding:15px 16px;border:1px solid var(--line);border-radius:15px;background:var(--glass);
    color:var(--paper);font-size:15.5px;font-weight:400;
    transition:transform .2s,border-color .2s,background .2s}
  .opt:hover{border-color:rgba(247,243,239,.3);background:rgba(247,243,239,.07)}
  .opt .mark{flex:0 0 20px;height:20px;border-radius:50%;border:1.6px solid rgba(247,243,239,.3);
    display:grid;place-items:center;transition:border-color .2s,background .2s}
  .opt.ms .mark{border-radius:6px}
  .opt .mark svg{width:12px;height:12px;opacity:0;transform:scale(.6);transition:.2s;color:var(--ink)}
  .opt.sel{border-color:var(--gold);background:rgba(255,224,0,.08)}
  .opt.sel .mark{background:var(--gold);border-color:var(--gold)}
  .opt.sel .mark svg{opacity:1;transform:scale(1)}
  .opt .txt{flex:1}

  .field{margin-top:18px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px}
  .input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:13px;
    background:rgba(247,243,239,.04);color:var(--paper);font:inherit;font-size:16px;outline:none;
    transition:border-color .2s,background .2s}
  .input::placeholder{color:rgba(247,243,239,.32)}
  .input:focus{border-color:rgba(247,243,239,.45);background:rgba(247,243,239,.06)}
  textarea.input{resize:vertical;min-height:120px;line-height:1.5}

  .btn{appearance:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px 20px;border:none;border-radius:15px;background:var(--paper);color:var(--ink);
    font:inherit;font-size:16px;font-weight:600;letter-spacing:-.01em;margin-top:24px;
    box-shadow:0 14px 38px -16px rgba(247,243,239,.5);
    transition:transform .2s,box-shadow .2s,opacity .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 46px -14px rgba(247,243,239,.62)}
  .btn:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none}
  .btn svg{width:18px;height:18px}
  .btn.cta{position:relative;animation:ctaGlow 2.6s ease-in-out 1s infinite}
  .btn.cta::after{content:"";position:absolute;inset:0;border-radius:inherit;
    border:1.5px solid rgba(247,243,239,.5);opacity:0;pointer-events:none;animation:ctaPing 2.6s ease-out 1s infinite}
  @keyframes ctaGlow{0%,100%{box-shadow:0 14px 38px -16px rgba(247,243,239,.45)}
    50%{box-shadow:0 16px 46px -12px rgba(247,243,239,.72)}}
  @keyframes ctaPing{0%{transform:scale(1);opacity:.5}70%,100%{transform:scale(1.07);opacity:0}}

  .err{margin-top:12px;font-size:13px;color:#ff9b7a;min-height:16px}

  /* ---- intro ---- */
  .promise{font-size:clamp(30px,8.4vw,42px);font-weight:300;line-height:1.06;letter-spacing:-.025em}
  .promise .hl{position:relative;display:inline-block;white-space:nowrap;font-weight:700;
    color:var(--paper);text-shadow:0 0 18px rgba(255,255,255,.18)}
  .promise .hl .ul{position:absolute;left:-1.5%;bottom:-.2em;width:103%;height:.36em;
    overflow:visible;pointer-events:none}
  .promise .hl .ul path{fill:var(--gold)}
  .promise2{margin-top:14px;font-size:16px;font-weight:400;color:var(--paper)}

  /* insignia de garantía (prioridad) */
  .guarantee{display:inline-flex;align-items:center;gap:9px;margin-top:16px;
    padding:9px 15px 9px 11px;border-radius:999px;
    background:rgba(255,224,0,.07);border:1px solid rgba(255,224,0,.26);
    font-size:15px;font-weight:600;color:var(--paper);opacity:0;
    animation:upin .6s cubic-bezier(.2,.8,.2,1) .05s forwards, gpulse 2.8s ease-in-out 1.1s infinite}
  .guarantee .gico{flex:0 0 auto;color:var(--gold);display:grid;place-items:center}
  .guarantee .gico svg{width:20px;height:20px}
  .guarantee b{font-weight:800;color:var(--gold)}
  @keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,224,0,0)}
    50%{box-shadow:0 0 18px -1px rgba(255,224,0,.30)}}

  .anim{opacity:0;animation:upin .6s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes upin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .perks{margin-top:24px;display:flex;flex-direction:column;gap:12px}
  .perk{display:flex;align-items:center;gap:12px;font-size:15px;color:rgba(247,243,239,.88)}
  .perk .ck{flex:0 0 22px;height:22px;border-radius:50%;background:rgba(255,224,0,.18);
    display:grid;place-items:center;color:var(--gold)}
  .perk .ck svg{width:13px;height:13px}
  .meta{margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:rgba(247,243,239,.42)}
  .tiny{margin-top:14px;font-size:12.5px;color:var(--muted);text-align:center}

  /* intro: fondo negro, sin foto */
  body.intro{background:#000}
  body.intro .bg{display:none}
  body.intro .top{display:none}
  body.intro .stage{justify-content:flex-start;padding:44px 0 44px}
  .introbody{margin-top:0}

  /* video bloqueado (censurado) */
  .lockedvideo{position:relative;width:100%;aspect-ratio:16/9;margin-top:24px;
    border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#0a0a0a}
  .lvthumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:blur(9px) brightness(.62) saturate(.95);transform:scale(1.12)}
  .lvover{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.28)}
  .lvlock{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;
    background:rgba(247,243,239,.12);border:1px solid rgba(247,243,239,.25);color:var(--paper);
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .lvlock svg{width:26px;height:26px}
  .lvnote{margin-top:12px;text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:12px;letter-spacing:.06em;color:var(--muted)}

  /* prueba social: cinta de retiros */
  .proof{margin-top:40px;width:100%}
  .proofhead{text-align:center;font-weight:800;line-height:1;letter-spacing:-.02em;
    font-size:clamp(30px,9.5vw,46px);
    background:linear-gradient(180deg,#ffffff 0%,#f1ede7 38%,#bcb6ad 76%,#928c83 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 16px rgba(255,255,255,.08))}
  .proofsub{margin-top:10px;margin-bottom:18px;text-align:center;
    display:flex;align-items:center;justify-content:center;gap:7px;
    font-size:15px;font-weight:500;font-style:italic;color:rgba(247,243,239,.68)}
  .vbadge{width:18px;height:18px;flex:0 0 18px;border-radius:50%;display:grid;place-items:center;
    background:#22c55e;color:#06210f;font-style:normal}
  .vbadge svg{width:11px;height:11px}
  .marquee{position:relative;width:calc(100% + 44px);margin-left:-22px;overflow:hidden;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent);
            mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent)}
  .track{display:flex;gap:12px;width:max-content;will-change:transform}
  .track img{height:122px;width:auto;border-radius:10px;border:1px solid var(--line);display:block}

  /* ---- video ---- */
  .videowrap{margin-top:22px;position:relative;width:100%;aspect-ratio:16/9;
    border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000}
  .videowrap iframe{width:100%!important;height:100%!important;border:0}
  .vph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--muted);text-align:center;padding:24px;font-size:14px}
  .vlock{margin-top:14px;font-size:12.5px;color:var(--muted);text-align:center}

  /* ---- thanks ---- */
  .thanks{text-align:center}
  .seal{width:64px;height:64px;border-radius:50%;margin:0 auto 22px;display:grid;place-items:center;
    background:rgba(247,243,239,.08);border:1px solid var(--line);color:var(--paper)}
  .seal svg{width:30px;height:30px}
  .home-link{display:inline-block;margin-top:26px;color:var(--muted);text-decoration:none;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em}
  .home-link:hover{color:var(--paper)}

  .fade{animation:fade .45s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.glow,.p{animation:none}.fade{animation:none}
    .btn.cta,.btn.cta::after{animation:none}
    .anim,.guarantee{opacity:1;animation:none;transform:none}}
</style>
</head>

        <div class="introbody">

          <div class="guarantee"><span class="gico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8.2-7 9-4-.8-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg></span><span>Trabajo contigo <b>hasta lograrlo</b></span></div>
          <div class="perks">
            <div class="perk anim" style="animation-delay:.24s"><span class="ck">${ck}</span> Te enseño mi estrategia paso a paso</div>
            <div class="perk anim" style="animation-delay:.36s"><span class="ck">${ck}</span> Operas en vivo conmigo</div>
            <div class="perk anim" style="animation-delay:.48s"><span class="ck">${ck}</span> Te fondeas con tus primeras cuentas</div>
          </div>
          <p class="meta">Cupos limitados · Proceso de selección</p>
          <div class="lockedvideo">
            <img class="lvthumb" src="https://img.youtube.com/vi/${YOUTUBE_ID}/hqdefault.jpg" alt="" onerror="this.style.display='none'">
            <div class="lvover"><div class="lvlock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div></div>
          </div>
          <p class="lvnote">Sigue los pasos para ver el video</p>
        </div>`;
      const body = wrap.querySelector('.introbody');
      const b = el('<button class="btn cta" type="button">Empezar mi postulación <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>');
      b.onclick = ()=>go(i+1);
      body.appendChild(b);
      body.appendChild(el('<p class="tiny">Tarda menos de 5 minutos.</p>'));
      // cinta de retiros (prueba social)
      const vbadge = '<span class="vbadge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-10"/></svg></span>';
      const imgs = (PROOFS||[]).map(s=>`<img src="${s}" alt="Comprobante de retiro de Jaime">`).join('');
      const proof = el(`<div class="proof">
        <div class="proofhead">Retiro +$15.000<br>cada mes</div>
        <div class="proofsub">demostrables ${vbadge}</div>
        <div class="marquee"><div class="track">${imgs}${imgs}</div></div>
      </div>`);
      body.appendChild(proof);
      startMarquee(proof.querySelector('.track'));
      return;
    }

    if(s.type==='fields'){
      let h = `<p class="eyebrow">${s.eyebrow}</p><h2 class="q">${s.q}</h2><p class="sub">${s.sub}</p>`;
      s.fields.forEach(f=>{ h += `<div class="field"><label>${f.label}</label>
        <input class="input" id="f_${f.key}" type="${f.input}" placeholder="${f.placeholder}" value="${answers[f.key]||''}"></div>`; });
      wrap.innerHTML = h;
      const err = el('<p class="err"></p>'); wrap.appendChild(err);
      const b = el('<button class="btn" type="button">Continuar</button>');
      b.onclick = ()=>{
        for(const f of s.fields){
          const v = document.getElementById('f_'+f.key).value.trim();
          if(!v){ err.textContent='Completa todos los campos para continuar.'; return; }
          answers[f.key]=v;
        }
        go(i+1);
      };
      wrap.appendChild(b);
      return;
    }

    if(s.type==='video'){
      wrap.innerHTML = `<p class="eyebrow">${s.eyebrow}</p><h2 class="q">${s.q}</h2><p class="sub">${s.sub}</p>
        <div class="videowrap" id="videowrap"></div>`;
      const b = el('<button class="btn" type="button" disabled>Continuar</button>');
      b.id='videoBtn'; wrap.appendChild(b);
      const lock = el('<p class="vlock">Mira el video para habilitar el botón de continuar.</p>');
      wrap.appendChild(lock);
      b.onclick = ()=>go(i+1);
      mountVideo(document.getElementById('videowrap'), b, lock);
      return;
    }

    if(s.type==='single' || s.type==='multi'){
      const multi = s.type==='multi';
      let h = `<h2 class="q">${s.q}</h2>${s.sub?`<p class="sub">${s.sub}</p>`:''}<div class="opts"></div>`;
      wrap.innerHTML = h;
      const opts = wrap.querySelector('.opts');
      const current = multi ? (answers[s.key]||[]) : answers[s.key];
      s.opts.forEach(o=>{
        const sel = multi ? current.includes(o) : current===o;
        const node = el(`<button class="opt ${multi?'ms':''} ${sel?'sel':''}" type="button"><span class="mark">${ck}</span><span class="txt">${o}</span></button>`);
        node.onclick = ()=>{
          if(multi){
            let arr = answers[s.key]||[];
            if(arr.includes(o)) arr=arr.filter(x=>x!==o); else arr=[...arr,o];
            answers[s.key]=arr;
            node.classList.toggle('sel');
            contBtn.disabled = (answers[s.key].length===0);
          } else {
            answers[s.key]=o;
            opts.querySelectorAll('.opt').forEach(n=>n.classList.remove('sel'));
            node.classList.add('sel');
            setTimeout(()=>go(i+1), 260);
          }
        };
        opts.appendChild(node);
      });
      let contBtn;
      if(multi){
        contBtn = el('<button class="btn" type="button">Continuar</button>');
        contBtn.disabled = (current.length===0);
        contBtn.onclick = ()=>go(i+1);
        wrap.appendChild(contBtn);
      }
      return;
    }

    if(s.type==='text'){
      wrap.innerHTML = `<h2 class="q">${s.q}</h2><p class="sub">${s.sub}</p>
        <div class="field"><textarea class="input" id="f_${s.key}" placeholder="${s.placeholder}">${answers[s.key]||''}</textarea></div>`;
      const err = el('<p class="err"></p>'); wrap.appendChild(err);
      const b = el('<button class="btn" type="button">Enviar postulación</button>');
      b.onclick = ()=>{
        const v = document.getElementById('f_'+s.key).value.trim();
        if(v.length<10){ err.textContent='Cuéntame un poco más para poder evaluar tu postulación.'; return; }
        answers[s.key]=v;
        submit(b);
      };
      wrap.appendChild(b);
      return;
    }

    if(s.type==='thanks'){
      wrap.innerHTML = `<div class="thanks">
        <div class="seal">${ck}</div>
        <h2 class="q">¡Postulación enviada!</h2>
        <p class="sub">Revisamos cada aplicación personalmente. Si tu perfil encaja con el proceso, te contactaremos por WhatsApp. Cupos limitados.</p>
        <a class="home-link" href="index.html">← Volver al inicio</a>
      </div>`;
      return;
    }
  }

  /* ====== VIDEO (YouTube + gate) ====== */
  let ytApiLoading=false, ytApiReady=false, ytQueue=[];
  function loadYT(){
    if(ytApiReady) return;
    if(!ytApiLoading){
      ytApiLoading=true;
      const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s);
      window.onYouTubeIframeAPIReady = function(){ ytApiReady=true; ytQueue.forEach(fn=>fn()); ytQueue=[]; };
    }
  }
  function mountVideo(box, btn, lock){
    let unlocked=false;
    function unlock(){ if(unlocked) return; unlocked=true; btn.disabled=false; lock.textContent='Listo, ya puedes continuar.'; if(window.__ytpoll) clearInterval(window.__ytpoll); }
    if(YOUTUBE_ID){
      box.innerHTML = '<div id="ytplayer" style="width:100%;height:100%;"></div>';
      const create = function(){
        new YT.Player('ytplayer', {
          videoId: YOUTUBE_ID,
          playerVars:{rel:0, modestbranding:1, playsinline:1},
          events:{
            'onStateChange': function(e){
              if(e.data===YT.PlayerState.ENDED){ unlock(); return; }
              if(e.data===YT.PlayerState.PLAYING){
                const pl=e.target;
                if(window.__ytpoll) clearInterval(window.__ytpoll);
                window.__ytpoll=setInterval(function(){
                  try{ const d=pl.getDuration(), t=pl.getCurrentTime();
                    if(d>0 && t/d>=REQUIRE_WATCH_PERCENT) unlock();
                  }catch(_){}
                },1000);
              }
            }
          }
        });
      };
      loadYT();
      if(ytApiReady) create(); else ytQueue.push(create);
    } else {
      box.innerHTML = `<div class="vph"><strong>Video</strong><span>Pega el ID del video en la configuración.</span></div>`;
    }
    if(DEMO_UNLOCK_SECONDS>0){ setTimeout(unlock, DEMO_UNLOCK_SECONDS*1000); }
  }

  /* ====== ENVÍO ====== */
  async function submit(btn){
    btn.disabled=true; btn.textContent='Enviando...';
    const payload = {...answers, fecha:new Date().toISOString()};
    try{
      if(APPS_SCRIPT_URL){
        await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',
          headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      } else {
        console.log('Postulación (demo):', payload);
      }
    }catch(e){ console.error(e); }
    go(steps.length-1);
  }

  /* ====== cinta infinita ====== */
  function startMarquee(track){
    if(!track) return;
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const gap = 12;
    const run = ()=>{
      const dist = (track.scrollWidth + gap) / 2;   // mitad exacta para un bucle sin saltos
      if(dist < 10){ requestAnimationFrame(run); return; }
      track.animate(
        [{transform:'translateX(0)'},{transform:`translateX(${-dist}px)`}],
        {duration: dist*22, iterations: Infinity, easing:'linear'}
      );
    };
    const imgs = [...track.querySelectorAll('img')];
    let pending = imgs.filter(im=>!im.complete).length;
    if(pending===0){ requestAnimationFrame(run); }
    else imgs.forEach(im=>{ if(!im.complete) im.addEventListener('load',()=>{ if(--pending===0) run(); }); });
  }

  /* particles */
  (function(){
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const box=document.getElementById('particles');
    for(let k=0;k<14;k++){const p=document.createElement('span');p.className='p';
      const sz=(Math.random()*2.2+1).toFixed(1);p.style.width=sz+'px';p.style.height=sz+'px';
      p.style.left=(Math.random()*100).toFixed(2)+'%';
      p.style.setProperty('--dx',(Math.random()*60-30).toFixed(0)+'px');
      const d=(Math.random()*9+9).toFixed(1);p.style.animationDuration=d+'s';
      p.style.animationDelay=(-Math.random()*d).toFixed(1)+'s';box.appendChild(p);}
  })();

  render();
  </script>
</body>
